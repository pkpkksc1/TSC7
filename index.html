<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TSC 뷰어 ver.1 (기출세트/3만능/3/4/5/6/7)</title>
<style>
  :root{
    --bg:#fff;
    --fg:#000;
    --line:#000;
    --muted:#444;
    --shadow:0 10px 26px rgba(0,0,0,.10);
    --danger:#d11a2a;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
  }

  .topbar{
    position:sticky;
    top:0;
    z-index:30;
    background:#fff;
    border-bottom:2px solid var(--line);
  }

  .topbarInner{
    max-width:1100px;
    margin:0 auto;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }

  .brandWrap{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .brand{
    font-weight:900;
    font-size:18px;
    padding:8px 12px;
    border:2px solid var(--line);
    min-width:120px;
    text-align:center;
  }

  .version{
    font-size:13px;
    font-weight:900;
    padding:6px 10px;
    border:2px solid var(--line);
    border-radius:999px;
    line-height:1;
  }

  .tabs{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }

  .tabBtn{
    border:2px solid var(--line);
    background:#fff;
    color:#000;
    padding:8px 12px;
    font-weight:900;
    cursor:pointer;
    border-radius:12px;
    user-select:none;
  }

  .tabBtn.active{
    background:#000;
    color:#fff;
  }

  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:14px 12px 36px;
  }

  .status{
    text-align:center;
    font-weight:900;
    font-size:14px;
    margin:10px 0 12px;
  }

  .timerBox{
    text-align:center;
    margin:4px 0 14px;
  }

  #timer{
    font-size:72px;
    line-height:1;
    font-weight:900;
    letter-spacing:1px;
  }

  #timer.danger{
    color:var(--danger);
  }

  .timerBtns{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .timerBtn{
    border:2px solid var(--line);
    background:#fff;
    color:#000;
    padding:8px 14px;
    font-weight:900;
    border-radius:12px;
    cursor:pointer;
  }

  .panel{
    border:2px solid var(--line);
    border-radius:18px;
    padding:14px;
    box-shadow:var(--shadow);
  }

  .pageImg{
    width:100%;
    max-height:42vh;
    object-fit:contain;
    border:2px solid var(--line);
    border-radius:14px;
    display:none;
    margin-bottom:12px;
    background:#fff;
  }

  .content{
    white-space:pre-wrap;
    line-height:1.75;
    font-size:18px;
    min-height:48vh;
  }

  .navBtn{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:52px;
    height:52px;
    border:2px solid var(--line);
    background:#fff;
    color:#000;
    font-weight:900;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:14px;
    user-select:none;
    z-index:40;
    opacity:.96;
  }

  .navLeft{ left:10px; }
  .navRight{ right:10px; }

  .navIcon{
    font-size:24px;
    line-height:1;
    margin-top:-1px;
  }

  @media (max-width:720px){
    .brand{
      font-size:16px;
      min-width:105px;
      padding:7px 10px;
    }

    .version{
      font-size:12px;
      padding:5px 9px;
    }

    .content{
      font-size:16px;
      min-height:56vh;
    }

    .navBtn{
      width:46px;
      height:46px;
      border-radius:12px;
    }

    .navIcon{
      font-size:22px;
    }

    #timer{
      font-size:110px;
    }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <div class="brandWrap">
        <div class="brand" id="brand">TSC</div>
        <div class="version">ver.1</div>
      </div>

      <div class="tabs" id="tabs"></div>
    </div>
  </div>

  <button class="navBtn navLeft" id="prevBtn" aria-label="이전">
    <span class="navIcon">‹</span>
  </button>
  <button class="navBtn navRight" id="nextBtn" aria-label="다음">
    <span class="navIcon">›</span>
  </button>

  <div class="wrap">
    <div class="status" id="status">불러오는 중...</div>

    <div class="timerBox" id="timerBox">
      <div id="timer">25</div>
      <div class="timerBtns">
        <button class="timerBtn" id="startTimer">▶ 시작</button>
        <button class="timerBtn" id="stopTimer">⏸ 정지</button>
      </div>
    </div>

    <div class="panel">
      <img id="pageImg" class="pageImg" alt="" />
      <div id="content" class="content">로딩...</div>
    </div>
  </div>

<script>
  const SOURCES = [
    { key:"기출세트", label:"기출세트", url:"기출세트/기출세트.txt" },
    { key:"3만능", label:"3만능", url:"3만능.txt" },
    { key:"TSC3", label:"TSC3", url:"tsc3/TSC3.txt" },
    { key:"TSC4", label:"TSC4", url:"tsc4/TSC4.txt" },
    { key:"TSC5", label:"TSC5", url:"tsc5/TSC5.txt" },
    { key:"TSC6", label:"TSC6", url:"tsc6/TSC6.txt" },
    { key:"TSC7", label:"TSC7", url:"tsc7/TSC7.txt" },
  ];

  const TIMER_MAP = {
    "기출세트": 15,
    TSC3: 15,
    TSC4: 25,
    TSC5: 50,
    TSC6: 40,
    TSC7: 90
  };

  const NO_TIMER_KEYS = new Set(["3만능"]);

  const SEP_REGEX = /\n\s*(?:===PAGE===|-{3,})\s*\n/g;

  let pages = [];
  let idx = 0;
  let current = SOURCES[0];

  let timerInterval = null;
  let timeLeft = 0;
  let running = false;

  const $ = (id)=>document.getElementById(id);

  function normalize(t){
    return t.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  }

  function splitPages(t){
    const s = "\n" + t.trim() + "\n";
    return s.split(SEP_REGEX).map(x=>x.trim()).filter(Boolean);
  }

  function extractImage(pageText){
    const m = pageText.match(/^\s*\[img:(.+?)\]\s*\n/i);
    if(!m) return { imgPath:null, text: pageText.trim() };
    return {
      imgPath: m[1].trim(),
      text: pageText.slice(m[0].length).trim()
    };
  }

  function renderTabs(){
    const tabs = $("tabs");
    tabs.innerHTML = "";

    for(const s of SOURCES){
      const b = document.createElement("button");
      b.className = "tabBtn" + (s.key === current.key ? " active" : "");
      b.textContent = s.label;
      b.onclick = ()=>setTab(s.key);
      tabs.appendChild(b);
    }

    $("brand").textContent = "TSC";
  }

  function updateTimer(){
    $("timer").textContent = `${timeLeft}`;

    if(timeLeft <= 10){
      $("timer").classList.add("danger");
    }else{
      $("timer").classList.remove("danger");
    }
  }

  function updateTimerVisibility(){
    $("timerBox").style.display = NO_TIMER_KEYS.has(current.key) ? "none" : "block";
  }

  function resetTimer(){
    clearInterval(timerInterval);
    running = false;

    if(NO_TIMER_KEYS.has(current.key)){
      timeLeft = 0;
      $("timer").classList.remove("danger");
      return;
    }

    timeLeft = TIMER_MAP[current.key] || 30;
    updateTimer();
  }

  function startTimer(){
    if(running) return;
    if(NO_TIMER_KEYS.has(current.key)) return;

    running = true;

    timerInterval = setInterval(()=>{
      timeLeft--;
      updateTimer();

      if(timeLeft <= 0){
        clearInterval(timerInterval);
        running = false;
        timeLeft = 0;
        updateTimer();
      }
    }, 1000);
  }

  function stopTimer(){
    running = false;
    clearInterval(timerInterval);
  }

  function render(){
    updateTimerVisibility();

    if(!pages.length){
      $("status").textContent = "데이터 없음";
      $("content").textContent =
`txt를 페이지로 나누려면 아래 중 하나를 한 줄로 넣어줘.

1) ===PAGE===
2) ---  (하이픈 3개 이상)

예)
첫페이지 내용...
===PAGE===
둘째페이지 내용...
---
셋째페이지 내용...`;

      $("pageImg").style.display = "none";
      $("pageImg").removeAttribute("src");
      resetTimer();
      return;
    }

    if(idx < 0) idx = 0;
    if(idx >= pages.length) idx = pages.length - 1;

    const {imgPath, text} = extractImage(pages[idx]);
    $("content").textContent = text || "";
    $("status").textContent = `${current.label} · ${idx+1} / ${pages.length}`;

    const img = $("pageImg");
    if(imgPath){
      img.src = imgPath;
      img.style.display = "block";
      img.alt = `page ${idx+1}`;
    }else{
      img.style.display = "none";
      img.removeAttribute("src");
      img.alt = "";
    }

    resetTimer();
  }

  function next(){
    if(!pages.length) return;
    idx = (idx + 1) % pages.length;
    render();
  }

  function prev(){
    if(!pages.length) return;
    idx = (idx - 1 + pages.length) % pages.length;
    render();
  }

  async function loadFromUrl(url){
    try{
      const res = await fetch(url, { cache:"no-store" });
      if(!res.ok) throw new Error("fetch failed");

      const text = normalize(await res.text());
      pages = splitPages(text);
      idx = 0;
      render();
    }catch(e){
      pages = [];
      $("status").textContent = "파일 못 불러옴";
      $("content").textContent = "파일 경로/이름(대소문자 포함) 확인해줘!";
      $("pageImg").style.display = "none";
      $("pageImg").removeAttribute("src");
      resetTimer();
      updateTimerVisibility();
    }
  }

  function setTab(key){
    const found = SOURCES.find(s=>s.key===key);
    if(!found) return;

    current = found;
    idx = 0;
    renderTabs();
    loadFromUrl(current.url);
  }

  $("nextBtn").addEventListener("click", next);
  $("prevBtn").addEventListener("click", prev);

  $("startTimer").addEventListener("click", startTimer);
  $("stopTimer").addEventListener("click", stopTimer);

  window.addEventListener("keydown",(e)=>{
    if(e.target && (e.target.tagName==="TEXTAREA" || e.target.tagName==="INPUT")) return;
    if(e.key==="ArrowRight") next();
    if(e.key==="ArrowLeft") prev();
    if(e.key===" ") {
      if(NO_TIMER_KEYS.has(current.key)) return;
      e.preventDefault();
      if(running){
        stopTimer();
      }else{
        startTimer();
      }
    }
  });

  renderTabs();
  loadFromUrl(current.url);
</script>
</body>
</html>
